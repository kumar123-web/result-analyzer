<!DOCTYPE html>
<html>

<head>

<title>Student Result Analyzer</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

.container{
background:white;
width:300px;
margin:auto;
padding:20px;
margin-top:100px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:90%;
padding:8px;
margin:5px;
}

button{
background:blue;
color:white;
border:none;
padding:10px;
width:100%;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Student Result Analyzer</h2>

<input id="name" placeholder="Student Name">

<input id="s1" placeholder="Subject 1 marks">

<input id="s2" placeholder="Subject 2 marks">

<input id="s3" placeholder="Subject 3 marks">

<button onclick="result()">Analyze</button>

<h3 id="output"></h3>

</div>

<script>

function result()
{

let s1=parseInt(document.getElementById("s1").value);
let s2=parseInt(document.getElementById("s2").value);
let s3=parseInt(document.getElementById("s3").value);

let total=s1+s2+s3;

let percentage=total/3;

let grade;

if(percentage>=75)
grade="A";

else if(percentage>=60)
grade="B";

else if(percentage>=50)
grade="C";

else
grade="Fail";

document.getElementById("output").innerHTML=

"Percentage : "+percentage+"<br> Grade : "+grade;

}

</script>

</body>

</html>
